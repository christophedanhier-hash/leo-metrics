<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>! Machines LEO · Dashboard</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;padding:20px}.container{max-width:1200px;margin:0 auto}h1{font-size:1.4rem;margin-bottom:2px}.sub{color:#64748b;font-size:.85rem;margin-bottom:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;margin-bottom:20px}.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:18px}.card h2{font-size:.7rem;text-transform:uppercase;color:#64748b;letter-spacing:.05em;margin-bottom:10px}.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.metric{background:#0f172a;border-radius:8px;padding:8px;text-align:center}.metric .label{color:#64748b;font-size:.65rem;text-transform:uppercase}.metric .value{font-size:1rem;font-weight:600;margin-top:2px}.ok{color:#22c55e}.warn{color:#f59e0b}.err{color:#ef4444}.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.chart-box{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:18px;margin-bottom:16px}.chart-box h3{font-size:.7rem;text-transform:uppercase;color:#64748b;margin-bottom:8px;letter-spacing:.05em}@media(max-width:640px){.chart-row{grid-template-columns:1fr}}</style></head><body><div class="container"><h1>! Machines LEO</h1><p class="sub">30/06/2026 19:56 · Collecte auto toutes les heures</p><div class="grid" id="cards"></div><div class="chart-row"><div class="chart-box"><h3>! Disque</h3><canvas id="diskChart"></canvas></div><div class="chart-box"><h3>! RAM</h3><canvas id="ramChart"></canvas></div></div></div><script>const data=[{"name": "LEO", "cpu": 0.16, "ram": 0, "disk": 17.0, "online": true}, {"name": "Penguin", "cpu": 0.0, "ram": 0, "disk": 0.0, "online": false}, {"name": "Yoga", "cpu": 0.0, "ram": 0, "disk": 0.0, "online": false}];const cols={LEO:"#3b82f6",Penguin:"#22c55e",Yoga:"#f59e0b"};function renderCards(){let h="";const names={LEO:"! LEO",Penguin:"! Penguin",Yoga:"! Yoga"};data.forEach(m=>{const c=m.online?"#22c55e":"#ef4444";const dc=m.disk>80?"#ef4444":m.disk>60?"#f59e0b":"#22c55e";const rc=m.ram>80?"#ef4444":m.ram>60?"#f59e0b":"#22c55e";h+="<div class="card" style="border-left:3px solid "+c+""><h2>"+names[m.name]+"</h2>"+"<div class="metric-grid"><div class="metric"><div class="label">CPU</div><div class="value">"+m.cpu.toFixed(2)+"</div></div>"+"<div class="metric"><div class="label">RAM</div><div class="value" style="color:"+rc+"">"+m.ram+"</div></div>"+"<div class="metric"><div class="label">Disque</div><div class="value" style="color:"+dc+"">"+m.disk+"</div></div>"+"<div class="metric"><div class="label">Statut</div><div class="value" style="color:"+c+"">"+(m.online?"Online":"Offline")+"</div></div></div></div>"});document.getElementById("cards").innerHTML=h;}renderCards();function makeChart(id,label,key){const ctx=document.getElementById(id).getContext("2d");new Chart(ctx,{type:"bar",data:{labels:data.map(m=>names[m.name]),datasets:[{label:label,data:data.map(m=>m[key]),backgroundColor:data.map(m=>cols[m.name]||"#3b82f6"),borderRadius:6,borderSkipped:false}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,max:100,grid:{color:"#1e293b"},ticks:{color:"#64748b",callback:function(v){return v+" "}}},y:{grid:{display:false},ticks:{color:"#94a3b8",font:{size:11}}}}}});}makeChart("diskChart","Disque","disk");makeChart("ramChart","RAM","ram");</script></body></html>
